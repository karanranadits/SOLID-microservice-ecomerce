services:
  auth_service:
    build: ./auth_service
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - CORS_ORIGINS=http://localhost:5173

  order_service:
    build: ./order_service
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - CORS_ORIGINS=http://localhost:5173
    depends_on:
      - payment_service

  payment_service:
    build: ./payment_service
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - CORS_ORIGINS=http://localhost:5173

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - auth_service
      - order_service
